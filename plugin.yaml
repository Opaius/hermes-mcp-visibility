name: mcp-visibility
version: 1.1.0
description: "Real MCP tool names on Discord. Security-aware, transport-agnostic: auto-discovers MCP tools, applies Hermes security checks to shell commands, works with or without lazy-mcp proxy."
author: cioky
kind: backend
provides_tools:
  - ctx_execute
  - ctx_search
  - ctx_index
  - ctx_fetch
  - ctx_batch
  - ctx_stats
  - ctx_doctor
  - ctx_upgrade
  - ctx_purge
  - ctx_insight
  - ctx_exec_file
  - web_search
  - web_read
hooks:
  pre_tool_call:
    - pre_tool_call_security
