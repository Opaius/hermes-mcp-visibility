name: mcp-visibility
version: 1.0.0
description: "Real MCP tool names on Discord. Auto-discovers all MCP tools from lazy-mcp proxy and registers them as native Hermes tools with clean names. Agnostic: detects whatever MCP servers are running."
author: cioky
kind: backend
provides_tools:
  - ctx_execute
  - ctx_search
  - ctx_index
  - ctx_fetch
  - ctx_batch
  - ctx_stats
  - ctx_doctor
  - ctx_upgrade
  - ctx_purge
  - ctx_insight
  - ctx_exec_file
  - web_search
  - web_read
